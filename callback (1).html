<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickBooks Authorization</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0f12; color:#e8eaf0; font-family:'IBM Plex Sans', sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; }
.box { background:#13161b; border:1px solid #2a3040; border-radius:12px; padding:40px; text-align:center; max-width:400px; width:90%; }
.icon { font-size:48px; margin-bottom:16px; }
.title { font-size:18px; font-weight:600; margin-bottom:8px; }
.sub { font-size:13px; color:#8892a4; margin-bottom:20px; }
.status { font-size:12px; font-family:monospace; color:#3b82f6; background:#0a1628; padding:8px 14px; border-radius:6px; margin-bottom:16px; }
.btn { display:inline-block; padding:10px 20px; background:#3b82f6; color:#fff; border-radius:6px; font-size:13px; cursor:pointer; border:none; font-family:inherit; }
.error { color:#ef4444; }
.success { color:#22c55e; }
</style>
</head>
<body>
<div class="box" id="box">
  <div class="icon" id="icon">⏳</div>
  <div class="title" id="title">Processing Authorization...</div>
  <div class="sub" id="sub">Please wait while we connect to QuickBooks</div>
  <div class="status" id="status">Extracting authorization code...</div>
</div>

<script>
(async function() {
  const icon = document.getElementById('icon');
  const title = document.getElementById('title');
  const sub = document.getElementById('sub');
  const status = document.getElementById('status');

  try {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const realmId = params.get('realmId');
    const stateParam = params.get('state');
    const error = params.get('error');

    if (error) {
      throw new Error('Authorization denied: ' + error);
    }

    if (!code || !realmId) {
      throw new Error('Missing authorization code or realm ID');
    }

    // Verify state to prevent CSRF
    const savedState = localStorage.getItem('qbo-oauth-state');
    if (savedState && stateParam && savedState !== stateParam) {
      throw new Error('State mismatch - possible CSRF attack');
    }

    status.textContent = 'Exchanging code for tokens...';

    // Read credentials from localStorage (saved by main app)
    const cfg = JSON.parse(localStorage.getItem('hyw-cfg') || '{}');
    const clientId = cfg.qboClientId;
    const clientSecret = cfg.qboClientSecret;
    const redirectUri = 'https://cheols4044.github.io/inventory/callback.html';

    if (!clientId || !clientSecret) {
      throw new Error('QBO credentials not found. Please configure in Settings first.');
    }

    // Exchange authorization code for tokens
    // NOTE: In production this should go through a backend server
    // For internal use, we exchange directly from browser
    const tokenResponse = await fetch('https://oauth.platform.intuit.com/oauth2/v1/tokens/bearer', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'Authorization': 'Basic ' + btoa(clientId + ':' + clientSecret),
        'Accept': 'application/json',
      },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        code: code,
        redirect_uri: redirectUri,
      }).toString(),
    });

    if (!tokenResponse.ok) {
      const errText = await tokenResponse.text();
      throw new Error('Token exchange failed: ' + tokenResponse.status + ' ' + errText);
    }

    const tokens = await tokenResponse.json();

    // Save tokens to localStorage so main app can read them
    const updatedCfg = JSON.parse(localStorage.getItem('hyw-cfg') || '{}');
    updatedCfg.qboRealmId = realmId;
    updatedCfg.qboAccessToken = tokens.access_token;
    updatedCfg.qboRefreshToken = tokens.refresh_token;
    updatedCfg.qboTokenExpiry = Date.now() + (tokens.expires_in * 1000);
    localStorage.setItem('hyw-cfg', JSON.stringify(updatedCfg));

    // Success UI
    icon.textContent = '✅';
    title.textContent = 'QuickBooks Connected!';
    title.className = 'title success';
    sub.textContent = 'Realm ID: ' + realmId;
    status.textContent = 'Tokens saved. Returning to app...';

    // Notify opener window if available
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({
        type: 'QBO_AUTH_SUCCESS',
        realmId: realmId,
        accessToken: tokens.access_token,
        refreshToken: tokens.refresh_token,
        expiresIn: tokens.expires_in,
      }, window.location.origin);
      setTimeout(() => window.close(), 1500);
    } else {
      // If opened in same tab, redirect back
      document.getElementById('box').innerHTML += `
        <button class="btn" onclick="window.location.href='index.html'" style="margin-top:12px;">
          Return to App →
        </button>`;
      setTimeout(() => { window.location.href = 'index.html'; }, 2500);
    }

  } catch (err) {
    icon.textContent = '❌';
    title.textContent = 'Authorization Failed';
    title.className = 'title error';
    sub.textContent = err.message;
    status.textContent = 'Please close this window and try again.';
    document.getElementById('box').innerHTML += `
      <button class="btn" onclick="window.close()" style="margin-top:12px;background:#374151;">
        Close Window
      </button>`;
    // Also notify opener of failure
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ type: 'QBO_AUTH_ERROR', error: err.message }, '*');
    }
  }
})();
</script>
</body>
</html>
